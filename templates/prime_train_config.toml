# Minimal hosted RL config template.
# Copy into episodes/<episode_id>/configs/<run_name>.toml and edit.

model = "meta-llama/Llama-3.2-1B-Instruct"
max_steps = 1
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 256

[[env]]
id = "primeintellect/alphabet-sort"
name = "episode_env"

[env.args]
# Replace with env-specific args.
seed = 1337420
