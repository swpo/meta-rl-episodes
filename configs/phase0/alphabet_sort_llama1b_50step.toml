# Phase 0 cost calibration: Llama 1B on a public, no-judge env.
#
# Goal: estimate hosted RL cost, wall time, token usage, and artifact shape for
# a small default run. Keep env/config fixed across phase-0 runs; vary only the
# model.

model = "meta-llama/Llama-3.2-1B-Instruct"
max_steps = 50
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 256

[[env]]
id = "primeintellect/alphabet-sort"
name = "alphabet_sort_cost_probe"

[env.args]
min_turns = 1
max_turns = 2
min_names_per_turn = 1
max_names_per_turn = 4
similarity_power = 4
power_per_turn = true
seed = 1337420
