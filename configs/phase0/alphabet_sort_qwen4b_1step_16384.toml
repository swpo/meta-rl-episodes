# Phase 0 diagnostic: find the smallest Qwen model with a usable hosted RL
# signal on alphabet-sort when using the large 16k token ceiling.

model = "Qwen/Qwen3.5-4B"
max_steps = 1
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "primeintellect/alphabet-sort"
name = "alphabet_sort_qwen4b_16384_smoke"

[env.args]
min_turns = 1
max_turns = 2
min_names_per_turn = 1
max_names_per_turn = 4
similarity_power = 4
power_per_turn = true
seed = 1337420
