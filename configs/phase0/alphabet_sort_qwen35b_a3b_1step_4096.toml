# Phase 0 diagnostic: verify that Qwen 35B-A3B hosted RL works once the
# generation cap is large enough for native Qwen thinking to reach final content.

model = "Qwen/Qwen3.5-35B-A3B"
max_steps = 1
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 4096

[[env]]
id = "primeintellect/alphabet-sort"
name = "alphabet_sort_qwen35b_4096_smoke"

[env.args]
min_turns = 1
max_turns = 2
min_names_per_turn = 1
max_names_per_turn = 4
similarity_power = 4
power_per_turn = true
seed = 1337420
