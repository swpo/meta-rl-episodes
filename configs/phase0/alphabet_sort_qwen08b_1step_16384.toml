# Phase 0 diagnostic: check whether Qwen 0.8B hosted RL gets a usable signal
# with the same large token ceiling used successfully in bioreasoning work.

model = "Qwen/Qwen3.5-0.8B"
max_steps = 1
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "primeintellect/alphabet-sort"
name = "alphabet_sort_qwen08b_16384_smoke"

[env.args]
min_turns = 1
max_turns = 2
min_names_per_turn = 1
max_names_per_turn = 4
similarity_power = 4
power_per_turn = true
seed = 1337420
