# Phase 0 cost calibration: Qwen 2B on the same public, no-judge env.
#
# Follow-up to the failed Qwen 0.8B probe. This checks whether the `None`
# assistant-content / zero-advantage failure was specific to the smallest Qwen
# model or persists for the Qwen family under this env/client path.

model = "Qwen/Qwen3.5-2B"
max_steps = 50
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 256

[[env]]
id = "primeintellect/alphabet-sort"
name = "alphabet_sort_cost_probe"

[env.args]
min_turns = 1
max_turns = 2
min_names_per_turn = 1
max_names_per_turn = 4
similarity_power = 4
power_per_turn = true
seed = 1337420

