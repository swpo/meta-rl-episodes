# Phase 0 cost calibration: Qwen 0.8B on the same public, no-judge env.
#
# Compare against the Llama 1B run with all other settings held fixed. Qwen may
# differ in output length, formatting behavior, queue behavior, and train-token
# accounting even at similar price.

model = "Qwen/Qwen3.5-0.8B"
max_steps = 50
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 256

[[env]]
id = "primeintellect/alphabet-sort"
name = "alphabet_sort_cost_probe"

[env.args]
min_turns = 1
max_turns = 2
min_names_per_turn = 1
max_names_per_turn = 4
similarity_power = 4
power_per_turn = true
seed = 1337420
