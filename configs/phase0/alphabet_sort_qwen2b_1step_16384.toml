# Phase 0 diagnostic: check whether Qwen 2B hosted RL still fails when given
# the same 16k token ceiling used successfully in prior Qwen-heavy experiments.

model = "Qwen/Qwen3.5-2B"
max_steps = 1
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "primeintellect/alphabet-sort"
name = "alphabet_sort_qwen2b_16384_smoke"

[env.args]
min_turns = 1
max_turns = 2
min_names_per_turn = 1
max_names_per_turn = 4
similarity_power = 4
power_per_turn = true
seed = 1337420
