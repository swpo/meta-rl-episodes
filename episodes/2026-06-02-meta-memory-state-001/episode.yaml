schema_version: 0.1.0
episode_id: "2026-06-02-meta-memory-state-001"
title: "Meta memory state pocket-ledger environment"
created_at: "2026-06-02T12:53:16-05:00"
updated_at: "2026-06-03T16:01:45-05:00"
agent:
  name: "Codex"
  model: "GPT-5 Codex"
  notes: "Initial env scaffold was developed in a separate Codex session, then integrated and analyzed in this repo."

research_question: "Can a cheap deterministic Verifiers environment produce a non-trivial RL signal for small-model ledger state tracking?"
hypotheses:
  - "Llama 1B should produce varied partial rewards because JSON format and arithmetic state tracking can fail independently."
  - "Per-account shaped reward should avoid all-or-nothing zero-advantage batches on early probes."
  - "Malformed outputs should receive low or partial reward without reward exceptions."

environment:
  kind: "hub"
  id: "abugoot/meta-memory-state"
  version: "0.6.0"
  dashboard_url: "https://app.primeintellect.ai/dashboard/environments/abugoot/meta-memory-state"
  local_path: "episodes/2026-06-02-meta-memory-state-001/env"
  entrypoint: "meta_memory_state:load_environment"
  hub:
    owner: "abugoot"
    name: "meta-memory-state"
    environment_id: "zpywfmvxv4368q1djpuitp5t"
    version_id: "jigzx1ag2fh2mqaibtjld9zd"
    content_hash: "790e961cdfdb2817941e56f22c10477c859dcc40b8ce52072b2422953d8e8653"
    wheel_sha256: "7f801e266c7d6660648af91d6646134bbb661eaf1e75612db49720a2e4b60a70"
    pushed_at: "2026-06-03T00:34:47Z"
    visibility: "PUBLIC"
    action_status: "SUCCESS"
  env_args:
    seed: 1337420
    num_examples: 128
    min_turns: 1
    max_turns: 2
    account_count: 2
  dataset:
    name: "synthetic-pocket-ledger"
    split: "generated"
    source_url: ""
  prompt_summary: "The successful smoke uses two tracked accounts, starting balances, and 1-2 debit/credit/transfer updates. The assistant must return the full ledger after every update."
  reward_summary: "Average per-turn deterministic reward. v0.6 scores account balances, total, no extra accounts, JSON/tag format, stronger schema adherence for extra top-level/balances keys, and anti-stuffing penalties for multiple candidates, repeated tags, code fences, and long outputs. Missing, malformed, None outputs, dict messages, and Verifiers message objects are handled defensively."
  parser_assumptions:
    - "Preferred output is one <ledger>...</ledger> block containing JSON with balances and total."
    - "Integer-like strings are accepted for balances."
    - "A fallback key:value parser gives low shaped credit for non-JSON ledger-like output."
  tools: []
  known_risks:
    - "The easier 1-2 turn / 2-account setting is useful for RL signal, and difficulty ablations through 4 accounts / 5-6 turns are now validated with completed runs."
    - "Version 0.1.0 failed Prime integration because README.md was missing; version 0.1.1 fixed this and passed."
    - "Versions 0.1.1-0.3.0 produced all-zero hosted rewards for different env/scoring reasons; these are preserved as diagnostic failures."
    - "Models may optimize for total while hallucinating accounts; extra-account penalty is intentionally small but present."
    - "Version 0.4.0 scores the best parseable candidate from verbose outputs; the 50-step run exploited this by emitting many ledger candidates and driving truncation near 97%."
    - "Version 0.5.0 fixes the best-candidate loophole, but base Llama 1B reward is sparse before RL: about 4% parseable assistant turns in 32-example evals."
    - "Version 0.5.0 Qwen 0.8B RL fixed the answer-stuffing behavior but exposed a smaller reward gap: extra keys inside balances and subtle two-turn arithmetic mistakes can still receive high partial reward."
    - "Version 0.6.0 tightened schema penalties and completed a cheap 30-step Qwen run, but arithmetic/state mistakes can still receive moderate to high partial reward."
    - "Normal prime eval run currently hangs for Qwen/Qwen3.5-0.8B on this env. The v0.5 adapter deployment timed out, the original v0.6 adapter deployment failed to load, and the v0.6 resume-regenerated adapter loaded only after a later redeploy retry. A second resume/restart attempt stalled twice at trainer checkpoint broadcast 26 and was stopped."

model_plan:
  default_probe_model: "Qwen/Qwen3.5-0.8B"
  capability_probe_models:
    - "meta-llama/Llama-3.2-1B-Instruct"
  token_budget_notes: "The successful Llama smoke uses max_tokens=512. v0.4.0 averaged about 291 sequence tokens with 2.2% truncation at one step; after 50 RL steps, decode length rose sharply and truncation reached 96.9%. v0.5/v0.6 Qwen training used max_tokens=16384 to avoid Qwen hosted token-ceiling issues, but actual decode length stayed short: about 37-41 tokens at step 0 and 39-43 tokens at final steps."
  expected_cost_notes: "One-step Llama 1B smokes on the easy 2-account setting cost about $0.008-$0.009 each. The v0.4 Llama 50-step follow-up cost $0.61 after the policy learned verbose answer stuffing. The v0.5 Qwen 0.8B 50-step run cost $0.07 for 1.16M training tokens, and the v0.6 Qwen 0.8B 30-step run cost $0.04 for 728.46K training tokens because anti-stuffing kept outputs short and Prime charged only the training bucket. Difficulty ablations with Qwen 0.8B cost $0.06 for 3 accounts / 2-3 turns, $0.08 for 3 accounts / 3-4 turns, $0.09 for 4 accounts / 3-4 turns, $0.05 for 4 accounts / 4-5 turns at batch 64, and $0.03 for 4 accounts / 5-6 turns at batch 32."

