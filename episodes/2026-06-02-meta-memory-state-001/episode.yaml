cost_summary:
  total_cost_usd: 1.3435
  notes: "Includes four completed 1-step Llama 1B hosted RL smokes, one completed v0.4 Llama 50-step follow-up, one failed no-usage v0.5 Llama launch, one completed v0.5 Qwen 0.8B 50-step run, one completed v0.6 Qwen 0.8B 30-step run, one completed v0.6 step-25-to-30 resume retry, one stopped v0.6 second resume retry, the v0.6 difficulty ladder through 4 accounts / 6-7 turns, the matched Qwen 2B scaling run, and associated stopped retry attempts. New costs after the 4-account / 5-6 turn run were $0.16 for Qwen 0.8B and $0.08 for Qwen 2B. Local eval token usage is recorded separately in evals but no eval cost total was reported by the CLI."

findings:
  summary: "Implemented, pushed, debugged, trained, and evaluated a cheap deterministic pocket-ledger state env. Version 0.4.0 produced a non-trivial hosted RL reward signal for Llama 1B, then exposed answer stuffing/truncation. Version 0.5.0 fixed that loophole, and v0.6.0 tightened schema penalties. Qwen 0.8B runs now show a clear ladder: easy 2-account/1-2-turn reward reached final 0.916, 3-account/2-3-turn reached 0.951, 3-account/3-4-turn reached 0.879, 4-account/3-4-turn reached 0.865, 4-account/4-5-turn with batch 64 reached 0.895, 4-account/5-6-turn with batch 32 reached 0.848, and 4-account/6-7-turn with batch 32 exposed a small-model bottleneck with final reward 0.713 plus a mid-run length/repetition spike. A matched Qwen 2B run on the 4-account/6-7-turn config avoided that pathology and reached final reward 0.957 for $0.08. Run-scoped held-out evals on the same 6-7-turn setting show base/trained reward of 0.651/0.862 for Qwen 0.8B and 0.728/0.955 for Qwen 2B, with trained 2B exact-turn rate 0.42 and solve_all_examples_rate still 0.0. Across harder settings, exact arithmetic/state fidelity remains the research question."
  success_criteria_met: true
  lessons:
    - "Pure helper tests allow reward robustness checks even without a local Verifiers install."
    - "The task differs from alphabet-sort by combining arithmetic updates, transfers, signed balances, totals, and hallucinated-entry penalties."
    - "Prime env integration requires an env README; version 0.1.0 failed CI for missing README.md, and version 0.1.1 passed."
    - "The prompt template's placeholder key `account` anchored Llama 1B into copying the wrong schema; v0.2.0 replaced it with concrete account keys."
    - "Hosted Verifiers reward functions receive `answer`, not the local test `state`; v0.3.0 fixed that but still scored zero."
    - "During hosted scoring, completions contain Verifiers message objects, while logged rollouts serialize to dicts; v0.4.0 accepts both and produced useful reward variance."
    - "The v0.4.0 integration action appeared stuck during launch, so the smoke used `--skip-action-check`; the action later completed SUCCESS."
    - "A 50-step cheap run is enough to reveal reward dynamics beyond smoke viability: reward improved, but answer coherence degraded into many candidate ledgers."
    - "Cheap models can still become more expensive during RL if the learned policy increases decode length; output-token cost was the main driver of the 50-step run."
    - "Held-out same-reward eval is necessary but not sufficient to establish intended behavior: trained held-out reward rose from base `0.025` to `0.782`, while truncation, code fences, and multi-candidate outputs all rose to `1.0`."
    - "Auxiliary metrics should be tracked alongside the same reward/objective, rather than replacing the objective with a harder eval-only reward by default."
    - "The v0.5 base evals confirm that anti-stuffing metrics can run in hosted evals and expose a cleaner but sparser pre-RL signal: about 4% parseable/exact-one-ledger turns and no truncation or multi-candidate outputs."
    - "The v0.5 Qwen run confirms anti-stuffing can redirect optimization: reward rose while truncation stayed 0.0 and final multi-candidate/code-fence rates were 0.0."
    - "For this easy 2-account setting, 50 steps is more than needed for learning signal; zero-advantage filtering reached 0.75 by the final step, so 20-30 steps is likely a better first probe."
    - "Small reward weights matter. An extra `total` key inside `balances` was only lightly penalized in v0.5 and became a concrete v0.6 regression."
    - "The v0.6 30-step Qwen run confirmed the cheaper probe length is enough for this easy setting: best reward 0.989 at step 25, final reward 0.916, exact-one-ledger 1.0, truncation 0.0, and cost $0.04."
    - "After schema/format loopholes are mostly controlled, the next useful metric is exact arithmetic/state correctness, because shaped partial reward still scores some wrong ledgers highly."
    - "v0.6 Llama held-out eval completed normally, so the eval harness still works; Qwen-specific eval/deployment failures are platform/client issues rather than a general env packaging failure."
    - "Prime's checkpoint_id resume path works for completed runs with READY checkpoints: a step-25-to-30 retry regenerated a fresh final adapter for only $0.0067."
    - "Retrying deployment of a READY adapter can resolve a prior timeout: lsbgjt98s0d1nyv5eofomojx reached DEPLOYED on a later redeploy and answered a one-shot inference smoke."
    - "Once deployed, the Qwen resume adapter can run through local eval: a 3-example held-out-seed probe scored reward 0.974 with parseable/exact-one-ledger 1.0 and no truncation, code fences, or multi-candidate outputs."
    - "A native Prime train restart can preserve the same resume failure mode: pnm7mpulnx3j8y1oyjz2sxwx stalled twice waiting for trainer checkpoint broadcast 26 despite a healthy env-server."
    - "Increasing env difficulty to 3 accounts / 2-3 turns creates a more informative RL trace: reward improved from 0.573 to 0.951, but the trajectory was noisier, sequence length/cost increased, and final solve_all was only 0.071."
    - "Format control and arithmetic/state correctness separate cleanly on the harder setting: exact-one-ledger reached 1.0 while samples still made wrong balance/total updates under high shaped reward."
    - "Increasing turn depth to 3 accounts / 3-4 turns creates a materially harder setting: reward improved from 0.566 to 0.879, but final solve_all stayed 0.0 and sampled step-20 outputs were still arithmetically wrong."
    - "The 3-4 turn run briefly reintroduced answer-length and multi-candidate pressure around steps 3-9, then recovered clean exact-one-ledger formatting by the final step. This is a useful RL dynamic for the meta dataset."
    - "Increasing width to 4 accounts at the same 3-4 turn depth did not create a sharp collapse: reward improved from 0.564 to 0.865, formatting recovered by step 10, and final solve_all stayed 0.0."
    - "For this env, turn depth and exact-state/total correctness appear to be more important difficulty axes than account width alone."
    - "At 4 accounts / 4-5 turns, batch size matters operationally: two batch-128 attempts stalled at trainer checkpoint broadcast 1, while batch 64 completed for $0.05."
    - "The completed 4-account / 4-5 turn batch-64 run still reached final reward 0.895 with exact-one-ledger 1.0 and solve_all 0.0, so this is not a shaped-reward degradation point."
    - "The completed 4-account / 5-6 turn batch-32 run is a clean harder trace: reward improved from 0.568 to 0.848, formatting mostly recovered, final solve_all remained 0.0, and sampled outputs still made large-transfer state and total errors."
    - "The stopped 4-account / 5-6 turn batch-64 attempt is superseded by the batch-32 run and should not be treated as a task signal."
    - "The completed 4-account / 6-7 turn Qwen 0.8B batch-32 run is the first clear small-model bottleneck: it hit a mid-run sequence-length/repetition spike at step 9 (seq length 14.7K, repetition filter 0.25, truncation 0.219, multi-candidate rate 0.309) before recovering to clean formatting, and ended at reward 0.713 with solve_all 0.0."
    - "The matched 4-account / 6-7 turn Qwen 2B run gives a strong model-scaling contrast: it avoided the length/repetition spike, reached final reward 0.957, kept exact-one-ledger/parseable/truncation at 1.0/1.0/0.0 by the end, and cost only $0.08 because token usage stayed low."
    - "For this env, model capability can reduce total cost despite higher per-token price when it prevents long-output failure modes."
    - "Run-scoped held-out evals are now stored under their linked RL run IDs with summary.json manifests, making later meta-dataset joins straightforward."
