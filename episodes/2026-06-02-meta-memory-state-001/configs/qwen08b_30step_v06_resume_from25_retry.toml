# Final-adapter retry for meta-memory-state v0.6.0.
#
# The original v0.6 Qwen run completed, but its generated final step-null
# adapter failed to deploy. This resumes from the last READY checkpoint
# (step 25) and targets the same step-30 endpoint so Prime can regenerate the
# final adapter artifact.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen08b_30step_v06_resume_from25_retry.toml --yes --plain

model = "Qwen/Qwen3.5-0.8B"
checkpoint_id = "vs01hyx5vxxbn431rb3qj22v"  # fdzqzv4ridlnhond78eghitd step 25
max_steps = 30
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "abugoot/meta-memory-state@0.6.0"
name = "meta_memory_state_qwen08b_30step_v06_resume_from25_retry"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 1
max_turns = 2
account_count = 2
