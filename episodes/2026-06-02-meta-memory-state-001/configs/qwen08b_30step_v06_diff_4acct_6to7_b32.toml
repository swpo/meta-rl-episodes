# Difficulty ablation for meta-memory-state v0.6.0.
#
# Push turn depth beyond the completed 4-account / 5-6 turn rung while keeping
# the model and hosted batch size fixed.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen08b_30step_v06_diff_4acct_6to7_b32.toml --yes --plain

model = "Qwen/Qwen3.5-0.8B"
max_steps = 30
batch_size = 32
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "abugoot/meta-memory-state@0.6.0"
name = "meta_memory_state_qwen08b_30step_v06_diff_4acct_6to7_b32"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 6
max_turns = 7
account_count = 4
