# Difficulty ablation for meta-memory-state v0.6.0.
#
# Pushes turn depth after the 4-account / 4-5 turn batch-64 run still reached
# high shaped reward. Batch size stays at 64 because batch-128 attempts at the
# previous depth stalled at trainer checkpoint broadcast 1.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen08b_30step_v06_diff_4acct_5to6_b64.toml --yes --plain

model = "Qwen/Qwen3.5-0.8B"
max_steps = 30
batch_size = 64
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "abugoot/meta-memory-state@0.6.0"
name = "meta_memory_state_qwen08b_30step_v06_diff_4acct_5to6_b64"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 5
max_turns = 6
account_count = 4
