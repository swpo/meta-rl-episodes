# Second final-adapter retry for meta-memory-state v0.6.0.
#
# The first resume retry completed and regenerated a final adapter, but that
# adapter deployment timed out. This resumes from the latest READY checkpoint of
# the first retry (step 25) and targets the same step-30 endpoint to regenerate
# another final adapter.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen08b_30step_v06_resume_retry2_from25.toml --yes --plain

model = "Qwen/Qwen3.5-0.8B"
checkpoint_id = "ykoqriy9kluvxwo2zksxwiyi"  # jspr0dm70xv1nzv2jkz8u8ug step 25
max_steps = 30
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "abugoot/meta-memory-state@0.6.0"
name = "meta_memory_state_qwen08b_30step_v06_resume_retry2_from25"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 1
max_turns = 2
account_count = 2
