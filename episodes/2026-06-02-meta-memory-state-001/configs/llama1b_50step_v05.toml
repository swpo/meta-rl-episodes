# Blocked reference config for a Llama 1B v0.5 anti-stuffing probe.
# This was not the successful v0.5 run. Hosted training rejected
# meta-llama/Llama-3.2-1B-Instruct with renderer auto-validation, while the
# sprints/Llama-3.2-1B-Instruct mirror rejected this env under free-tier checks.
# Use qwen08b_50step_v05.toml for the completed v0.5 probe.

model = "meta-llama/Llama-3.2-1B-Instruct"
max_steps = 50
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 512

[[env]]
id = "abugoot/meta-memory-state@0.5.0"
name = "meta_memory_state_llama1b_50step_v05"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 1
max_turns = 2
account_count = 2
