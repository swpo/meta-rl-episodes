# Hosted smoke config for the pushed Prime Hub env.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/llama1b_1step_smoke.toml --yes --plain

model = "meta-llama/Llama-3.2-1B-Instruct"
max_steps = 1
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 512

[[env]]
id = "abugoot/meta-memory-state"
name = "meta_memory_state_llama1b_1step_smoke"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 2
max_turns = 5
account_count = 4
