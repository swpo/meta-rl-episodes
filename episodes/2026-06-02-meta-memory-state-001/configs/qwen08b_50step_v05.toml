# Hosted 50-step anti-stuffing probe for meta-memory-state v0.5.0.
# Uses Qwen/Qwen3.5-0.8B because current hosted renderer validation blocks
# meta-llama/Llama-3.2-1B-Instruct without admin-only run_config overrides.
# Qwen 0.8B previously worked with the direct renderer path at a 16K token cap.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen08b_50step_v05.toml --yes --plain

model = "Qwen/Qwen3.5-0.8B"
max_steps = 50
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "abugoot/meta-memory-state@0.5.0"
name = "meta_memory_state_qwen08b_50step_v05"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 1
max_turns = 2
account_count = 2
