# Difficulty ablation for meta-memory-state v0.6.0.
#
# Keeps the successful Qwen 0.8B 30-step training setup fixed and only changes
# env difficulty from 2 accounts / 1-2 turns to 3 accounts / 2-3 turns. The goal
# is to find whether this env leaves the small-model saturation regime before
# running training-parameter or model-size ablations.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen08b_30step_v06_diff_3acct_2to3.toml --yes --plain

model = "Qwen/Qwen3.5-0.8B"
max_steps = 30
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "abugoot/meta-memory-state@0.6.0"
name = "meta_memory_state_qwen08b_30step_v06_diff_3acct_2to3"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 2
max_turns = 3
account_count = 3
