# Difficulty ablation for meta-memory-state v0.6.0.
#
# Keeps the successful Qwen 0.8B 30-step training setup fixed and changes one
# difficulty axis relative to the previous ablation: 3 accounts stays fixed,
# while the state chain grows from 2-3 turns to 3-4 turns.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen08b_30step_v06_diff_3acct_3to4.toml --yes --plain

model = "Qwen/Qwen3.5-0.8B"
max_steps = 30
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "abugoot/meta-memory-state@0.6.0"
name = "meta_memory_state_qwen08b_30step_v06_diff_3acct_3to4"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 3
max_turns = 4
account_count = 3
