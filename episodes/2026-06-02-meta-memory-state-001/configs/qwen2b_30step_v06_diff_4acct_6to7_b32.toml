# Match the 4-account / 6-7 turn Qwen 0.8B difficulty run, but scale to the
# next available Qwen size.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen2b_30step_v06_diff_4acct_6to7_b32.toml --yes --plain

model = "Qwen/Qwen3.5-2B"
