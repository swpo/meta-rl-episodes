# Hosted 30-step schema-penalty probe for meta-memory-state v0.6.0.
# Uses Qwen/Qwen3.5-0.8B on the direct renderer path. v0.5 saturated the easy
# 2-account setting by roughly 20-30 steps, so this should be enough to check
# whether the stricter schema reward preserves cheap learning without stuffing.
# Expected command:
# prime train episodes/2026-06-02-meta-memory-state-001/configs/qwen08b_30step_v06.toml --yes --plain

model = "Qwen/Qwen3.5-0.8B"
max_steps = 30
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 16384

[[env]]
id = "abugoot/meta-memory-state@0.6.0"
name = "meta_memory_state_qwen08b_30step_v06"

[env.args]
seed = 1337420
num_examples = 128
min_turns = 1
max_turns = 2
account_count = 2
