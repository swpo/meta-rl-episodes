  total_cost_usd: 0.2578
  notes: "Hosted RL/training costs only: $0.0078 Llama smoke, $0.10 Llama 20-step, $0.01 Qwen tool smoke, $0.00 stalled Qwen attempt, $0.08 failed-but-useful Qwen 20-step, and $0.06 completed Qwen 10-step. Eval inference token usage is recorded in metadata but not priced here."

findings:
  summary: "The no-tool version shows partial arithmetic learning with Llama 1B; the tool-mode version shows Qwen 2B learning a reliable one-call tool protocol."
  success_criteria_met: true
  lessons:
    - "The mixed table rung gives a cheap non-trivial RL signal: base held-out reward 0.0113 -> trained held-out reward 0.4647."
    - "Parseability can saturate while exact-answer rate remains low, so exact-answer and answer-score should be logged separately from reward."
    - "Tool access alone can lower reward when the base policy loops tool calls; log tool count, tool errors, and max-turn behavior."
    - "The completed Qwen 2B tool run learned one tool call and reached held-out reward 1.0, but a longer run crashed once zero-advantage filtering removed all variation."
    - "Mixed metadata fields in generated examples should be JSON-serialized to avoid Arrow schema failures."
  failure_modes:
    - "v0.1.0 mixed eval failed on Arrow-incompatible heterogeneous info metadata."
    - "Step-specific final adapter records remained UPLOADING; the step-null final adapter was the usable deployment artifact."
    - "The model often returns valid JSON outside required result tags, receiving partial reward but failing exact-one-result."
    - "Hosted Llama 1B failed with tool calls before generation."
    - "The 20-step Qwen tool run failed from all-filtered zero-advantage batches once the task became too easy."
  reward_hacking_observed: false
  reward_hacking_notes: "No candidate stuffing or truncation-based exploit emerged. The main reward gap is shaped partial credit for near-miss arithmetic and JSON outside tags."

