schema_version: 0.1.0
episode_id: "2026-06-03-meta-data-analysis-lite-001"
title: "Small-table arithmetic RL environment"
created_at: "2026-06-03T16:31:30-05:00"
updated_at: "2026-06-04T06:50:00-05:00"
agent:
  name: "Codex"
  model: "GPT-5"
  notes: "Second clean-slate meta RL episode; started as a no-tool table-arithmetic environment, then added a cheap deterministic tool-mode extension."

research_question: "Can a small model learn reliable tabular arithmetic over generated CSVs using a cheap deterministic reward, and where does difficulty appear as row count and task mix scale?"
hypotheses:
  - "Llama 1B may learn result-tag/schema behavior quickly but struggle with aggregation as rows/task mix scale."
  - "Reward should separate format compliance, exact answer rate, and numeric closeness."
  - "Row count and task-family mix should give an interpretable difficulty ladder before model scaling."

environment:
  kind: "hub"
  id: "abugoot/meta-data-analysis-lite"
  version: "0.2.1"
  dashboard_url: "https://app.primeintellect.ai/dashboard/environments/abugoot/meta-data-analysis-lite"
  local_path: "episodes/2026-06-03-meta-data-analysis-lite-001/env"
  entrypoint: "meta_data_analysis_lite.load_environment"
  hub:
    owner: "abugoot"
    name: "meta-data-analysis-lite"
    environment_id: "a6slfypd4rv7v2gkp0awdb24"
    version_id: ""
    content_hash: "fd2e9aec"
    wheel_sha256: "81674c42cb183d2ee5c70a7fbc26b06f35a94a272f51e5b1ceacb8ba1f70f600"
    pushed_at: "2026-06-04T06:25:23-05:00"
    visibility: "PUBLIC"
    action_status: "SUCCESS"
  version_history:
    - version: "0.1.1"
      content_hash: "755796fa"
      wheel_sha256: "ca04d3cf7522bcf5bf14b5199a868e30bd3b7c1836302393be937bae110ff12a"
      notes: "No-tool first-pass environment and Llama 1B RL run."
    - version: "0.2.1"
      content_hash: "fd2e9aec"
      wheel_sha256: "81674c42cb183d2ee5c70a7fbc26b06f35a94a272f51e5b1ceacb8ba1f70f600"
      notes: "Optional deterministic analyze_table tool mode."
  env_args:
    seed: 20260603
    num_examples: 128
    min_rows: 8
    max_rows: 12
    task_families: "sum_units_by_region,sum_revenue_by_product,count_rows_filter,max_region_revenue,diff_product_revenue,avg_unit_price_by_channel"
  dataset:
    name: "synthetic generated CSV tables"
    split: "generated"
    source_url: ""
  prompt_summary: "Single user turn containing a generated CSV and one arithmetic/aggregation question."
  reward_summary: "Shaped deterministic score for exactly one JSON result object inside <result> tags, with answer correctness, schema/format credit, and anti-stuffing penalties."
  parser_assumptions:
    - "Score the selected final result candidate rather than the best hidden candidate."
    - "Accept valid JSON outside tags with a format penalty."
    - "Coerce numeric strings for scoring, but reward schema prefers a JSON number."
  tools:
    - name: "analyze_table"
      version_added: "0.2.0"
      cost_label: "tool-cheap"
      description: "Computes the generated table question from CSV text and exact question; model must still emit the final result tag."
  known_risks:
    - "Version 0.1.0 passed numeric-only easy eval but failed mixed task loading because heterogeneous info fields were not Arrow-compatible; version 0.1.1 stores mixed metadata as JSON strings."
    - "Reward can improve via parseability and numeric near-misses while exact answer rate remains low."
    - "The current reward grants correctness credit to JSON outside result tags with a format penalty, which is useful for shaping but should be tracked."
    - "Step-specific adapter records can remain UPLOADING after completion; the step-null final adapter was the deployable one in this run."
    - "Hosted Llama 1B failed before generation when tool calls were enabled, while no-tool evals still worked."
    - "Tool-mode Qwen 2B can become too easy for enforced zero-advantage filtering; a 20-step run crashed after all rollouts were filtered."

model_plan:
  default_probe_model: "meta-llama/Llama-3.2-1B-Instruct"
  capability_probe_models:
    - "Qwen/Qwen3.5-0.8B"
    - "Qwen/Qwen3.5-2B"
  token_budget_notes: "No-tool v0.1 fits within 512 output tokens. The 20-step run averaged short eval outputs after training, but tool variants may need larger ceilings."
  expected_cost_notes: "No sandbox or judge model. The v0.1.1 1-step Llama smoke cost $0.0078, the 20-step Llama run cost $0.10, and the completed v0.2.1 10-step Qwen 2B tool run cost $0.06."

