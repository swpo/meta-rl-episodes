# First non-trivial RL probe for meta-data-analysis-lite v0.1.1.
#
# Expected command:
# prime train episodes/2026-06-03-meta-data-analysis-lite-001/configs/llama1b_20step_v011_mixed.toml --yes --plain

model = "meta-llama/Llama-3.2-1B-Instruct"
max_steps = 20
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 512

[[env]]
id = "abugoot/meta-data-analysis-lite@0.1.1"
name = "meta_data_analysis_lite_llama1b_20step_v011_mixed"

[env.args]
seed = 20260603
num_examples = 128
min_rows = 8
max_rows = 12
task_families = "sum_units_by_region,sum_revenue_by_product,count_rows_filter,max_region_revenue,diff_product_revenue,avg_unit_price_by_channel"
